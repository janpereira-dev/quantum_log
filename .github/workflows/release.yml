name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: anchore/sbom-action/download-syft@v0
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: sigstore/cosign-installer@v3
      - name: Sign release checksums
        run: cosign sign-blob dist/checksums.txt --bundle dist/checksums.txt.sigstore.json --yes
      - name: Upload signature bundle
        run: gh release upload "${{ github.ref_name }}" dist/checksums.txt.sigstore.json --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
