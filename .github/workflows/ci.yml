name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
      - run: go mod tidy
      - run: git diff --exit-code go.mod go.sum
      - run: test -z "$(gofmt -l $(git ls-files '*.go'))"
        shell: bash
      - run: go vet ./...
      - run: go test ./...
      - run: go test -race ./...
      - run: go build ./...
      - run: sh -n installers/install.sh installers/uninstall.sh
        shell: bash
      - run: pwsh -NoProfile -File installers/install.ps1 --dry-run --version v0.0.0 --install-dir "${{ runner.temp }}/qlog-bin" --no-modify-path
        if: runner.os == 'Windows'
      - run: pwsh -NoProfile -File installers/uninstall.ps1 --dry-run --install-dir "${{ runner.temp }}/qlog-bin" --no-modify-path
        if: runner.os == 'Windows'
      - run: cmd /c installers\install.cmd --dry-run --version v0.0.0 --install-dir "%RUNNER_TEMP%\qlog-bin" --no-modify-path
        if: runner.os == 'Windows'
      - run: cmd /c installers\uninstall.cmd --dry-run --install-dir "%RUNNER_TEMP%\qlog-bin" --no-modify-path
        if: runner.os == 'Windows'
      - uses: golangci/golangci-lint-action@v8
        with:
          version: latest
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...
